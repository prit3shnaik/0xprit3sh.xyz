<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kitsune — CTI Investigation Platform</title>
    <link rel="stylesheet" href="/css/main.css">
    <!-- External Libraries -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/vis-network/9.1.6/vis-network.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/vis-network/9.1.6/vis-network.min.css" rel="stylesheet">
    
    <!-- Inline Styles for New Features (Append to main.css if preferred, but this ensures it works now) -->
    <style>
        .watchlist-chip {
            display: inline-flex; align-items: center; gap: 4px;
            font-size: 0.65rem; padding: 3px 8px; margin: 2px;
            background: var(--bg3); border: 1px solid var(--border2);
            color: var(--text2); border-radius: 12px; cursor: pointer;
            transition: all 0.15s;
        }
        .watchlist-chip:hover { border-color: var(--red); color: var(--red); }
        .feed-item { padding: 8px; border-bottom: 1px solid var(--border); }
        .feed-item:hover { background: var(--bg2); }
        .feed-ioc { color: var(--accent2); font-family: var(--font); word-break: break-all; }
        .feed-meta { font-size: 0.7rem; color: var(--dim); margin-top: 2px; }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 1000; justify-content: center; align-items: center; }
        .modal.visible { display: flex; }
        .modal-content { background: var(--bg2); border: 1px solid var(--border2); padding: 20px; border-radius: 6px; width: 90%; max-width: 500px; }
        .modal-input { width: 100%; padding: 8px; margin: 5px 0 10px; background: var(--bg3); border: 1px solid var(--border2); color: var(--text); font-family: var(--font); border-radius: 4px; }
        .owb { background: none; border: 1px solid var(--border2); color: var(--dim); padding: 4px 8px; cursor: pointer; font-family: var(--font); font-size: 0.7rem; border-radius: 4px; }
        .owb:hover { border-color: var(--accent); color: var(--accent); }
    </style>
</head>
<body>

    <!-- Header -->
    <header class="site-header">
        <div class="container">
            <a href="/" class="site-logo">
                <span class="prompt">0xprit3sh</span><span class="cursor-blink">_</span>
            </a>
            <nav class="main-nav desktop-nav">
                <a href="/">home</a>
                <a href="/tools/kitsune/" class="active">osint</a>
                <a href="/writeups">writeups</a>
                <a href="/blog">blog</a>
            </nav>
            <div class="header-actions desktop-actions">
                <button class="theme-btn" onclick="toggleTheme()">[ light ]</button>
                <a href="/" class="edit-btn">edit</a>
            </div>
            <button class="hamburger-btn" id="hamburgerBtn">
                <span class="hamburger-line"></span>
                <span class="hamburger-line"></span>
                <span class="hamburger-line"></span>
            </button>
        </div>
    </header>

    <!-- Main OSINT Workspace -->
    <main class="site-main">
        <div class="container">
            <header class="page-header">
                <h1 class="page-title">Kitsune <span class="dim">— CTI Platform</span></h1>
                <div class="page-count">v2.1</div>
            </header>

            <div class="osint-workspace">
                <!-- LEFT SIDEBAR -->
                <aside class="ow-left">
                    <div class="ow-left-top">
                        <div class="ow-title-row">
                            <span class="ow-title">investigations</span>
                            <span class="ow-count" id="caseCount">0</span>
                            <a href="#" class="ow-new-btn" onclick="showModal('newCaseModal')">+ new</a>
                        </div>
                        <div class="ow-search-row">
                            <input type="text" class="ow-search" placeholder="search..." id="caseSearch">
                        </div>
                        <div class="ow-tabs-row">
                            <button class="owt on" onclick="switchSidebarTab('cases')">cases</button>
                            <button class="owt" onclick="switchSidebarTab('entities')">entities</button>
                            <button class="owt" onclick="switchSidebarTab('watchlist')">watchlist</button>
                        </div>
                    </div>

                    <!-- Cases Tab -->
                    <div class="ow-tab-panel on" id="tab-cases">
                        <div class="ow-inv-list" id="caseList">
                            <div class="ow-empty">
                                <div class="ow-empty-icon"></div>
                                <div>no cases yet</div>
                            </div>
                        </div>
                    </div>

                    <!-- Entities Tab -->
                    <div class="ow-tab-panel" id="tab-entities">
                        <div class="ow-entities" id="entityList">
                            <div class="ow-empty">
                                <div class="ow-empty-icon">◎</div>
                                <div>no entities</div>
                            </div>
                        </div>
                    </div>

                    <!-- Watchlist Tab -->
                    <div class="ow-tab-panel" id="tab-watchlist">
                        <div style="padding:10px; border-bottom:1px solid var(--border);">
                            <input type="text" class="ow-search" id="watchlistInput" placeholder="keyword to monitor...">
                            <button class="ow-new-btn" style="width:100%; margin-top:5px;" onclick="addToWatchlist()">+ add</button>
                        </div>
                        <div id="watchlistDisplay" style="padding:10px;"></div>
                    </div>
                </aside>

                <!-- RIGHT CANVAS -->
                <section class="ow-canvas">
                    <!-- Toolbar -->
                    <div class="ow-toolbar">
                        <div class="ow-toolbar-row1">
                            <div class="owt-left">
                                <span class="owt-label" id="canvasTitle">📡 Live Threat Feed</span>
                            </div>
                            <div class="owt-stats">
                                <span class="owt-stat">total: <span id="statTotal">0</span></span>
                                <span class="owt-stat">🔥 <span id="statCritical">0</span></span>
                            </div>
                            <div class="owt-right">
                                <button class="owb" onclick="showModal('apiKeysModal')"> keys</button>
                                <button class="owb" onclick="generateReport()">📄 pdf</button>
                            </div>
                        </div>
                        <div class="ow-toolbar-row2">
                            <div class="owt-views">
                                <button class="owb on" onclick="switchView('feed')">feed</button>
                                <button class="owb" onclick="switchView('graph')">graph</button>
                                <button class="owb" onclick="switchView('cves')">cves</button>
                                <button class="owb" onclick="switchView('breach')">breach</button>
                                <button class="owb" onclick="switchView('mitre')">mitre</button>
                            </div>
                            <div class="owt-actions">
                                <select class="owb" id="autoRefresh" onchange="toggleAutoRefresh()">
                                    <option value="0">auto: off</option>
                                    <option value="300000">auto: 5m</option>
                                </select>
                                <button class="owb" onclick="refreshFeeds()"> refresh</button>
                            </div>
                        </div>
                    </div>

                    <!-- Views -->
                    <div class="ow-view on" id="view-feed">
                        <div id="feedContainer" style="padding:10px; overflow-y:auto; height:100%;">
                            <div class="loading">loading threat intelligence...</div>
                        </div>
                    </div>

                    <div class="ow-view" id="view-graph">
                        <div style="height:100%; width:100%;" id="networkGraph"></div>
                    </div>

                    <div class="ow-view" id="view-cves">
                        <div style="padding:10px;">
                            <input type="text" id="cveSearch" class="ow-search" placeholder="search CVEs..." style="width:100%; margin-bottom:10px;">
                            <button class="owb" onclick="searchCVEs()">search</button>
                            <div id="cveContainer" style="margin-top:10px;"></div>
                        </div>
                    </div>

                    <div class="ow-view" id="view-breach">
                        <div style="padding:20px; text-align:center;">
                            <h3 style="color:var(--accent)">🔓 Have I Been Pwned</h3>
                            <div style="display:flex; gap:10px; max-width:400px; margin:15px auto;">
                                <input type="email" id="breachEmail" class="ow-search" placeholder="email@example.com">
                                <button class="owb" onclick="checkBreach()">check</button>
                            </div>
                            <div id="breachResult"></div>
                        </div>
                    </div>
                    
                    <div class="ow-view" id="view-mitre">
                        <div style="padding:20px;">
                            <h3 style="color:var(--accent); margin-bottom:10px;">🎯 MITRE ATT&CK</h3>
                            <div id="mitreGrid" style="display:grid; grid-template-columns:repeat(auto-fill, minmax(150px, 1fr)); gap:10px;"></div>
                        </div>
                    </div>
                </section>
            </div>
        </div>
    </main>

    <!-- Modals -->
    <div class="modal" id="newCaseModal">
        <div class="modal-content">
            <h3 class="page-title">New Case</h3>
            <input type="text" class="modal-input" id="caseName" placeholder="case name">
            <div style="display:flex; gap:10px;">
                <button class="owb" style="flex:1;" onclick="closeModal('newCaseModal')">cancel</button>
                <button class="owb" style="flex:1; background:var(--accent); color:#000;" onclick="createCase()">create</button>
            </div>
        </div>
    </div>

    <div class="modal" id="apiKeysModal">
        <div class="modal-content">
            <h3 class="page-title">⚙ API Keys</h3>
            <input type="password" class="modal-input" id="abuseKey" placeholder="abuse.ch Key">
            <input type="password" class="modal-input" id="hibpKey" placeholder="HIBP Key">
            <button class="owb" style="width:100%; background:var(--accent); color:#000;" onclick="saveApiKeys()">save</button>
            <button class="owb" style="width:100%; margin-top:5px;" onclick="closeModal('apiKeysModal')">close</button>
        </div>
    </div>

    <!-- SCRIPTS -->
    <script>
        // CONFIG
        const PROXY_BASE = "https://YOUR-VERCEL-URL.vercel.app/api/proxy"; // UPDATE THIS
        
        // STATE
        let cases = JSON.parse(localStorage.getItem('kitsune_cases') || '[]');
        let apiKeys = JSON.parse(localStorage.getItem('kitsune_apikeys') || '{}');
        let watchlist = JSON.parse(localStorage.getItem('kitsune_watchlist') || '[]');
        let currentFeed = [];
        let currentFilter = 'all';
        let network = null;
        let selectedMITRE = [];

        // THEME
        function toggleTheme() {
            document.body.classList.toggle('light-mode');
            const isLight = document.body.classList.contains('light-mode');
            localStorage.setItem('kitsune-theme', isLight ? 'light' : 'dark');
            document.querySelectorAll('.theme-btn').forEach(b => b.textContent = isLight ? '[ dark ]' : '[ light ]');
        }
        function loadTheme() {
            if(localStorage.getItem('kitsune-theme') === 'light') {
                document.body.classList.add('light-mode');
                document.querySelectorAll('.theme-btn').forEach(b => b.textContent = '[ dark ]');
            }
        }

        // TABS & VIEWS
        function switchSidebarTab(tab) {
            document.querySelectorAll('.ow-tab-panel').forEach(p => p.classList.remove('on'));
            document.querySelectorAll('.owt').forEach(b => b.classList.remove('on'));
            document.getElementById('tab-'+tab).classList.add('on');
            event.target.classList.add('on');
        }
        function switchView(view) {
            document.querySelectorAll('.ow-view').forEach(v => v.classList.remove('on'));
            document.querySelectorAll('.owt-views .owb').forEach(b => b.classList.remove('on'));
            document.getElementById('view-'+view).classList.add('on');
            event.target.classList.add('on');
            if(view === 'feed') refreshFeeds();
            if(view === 'graph') initGraph();
            if(view === 'mitre') renderMITRE();
        }

        // FEED LOGIC
        async function fetchSecure(url) {
            try {
                const res = await fetch(`${PROXY_BASE}?target=${encodeURIComponent(url)}`);
                return await res.json();
            } catch(e) { return null; }
        }

        async function refreshFeeds() {
            const c = document.getElementById('feedContainer');
            c.innerHTML = '<div class="loading">loading...</div>';
            
            const [cisa, feodo, urlhaus, openphish] = await Promise.all([
                fetchSecure('https://www.cisa.gov/sites/default/files/feeds/known_exploited_vulnerabilities.json'),
                fetchSecure('https://feodotracker.abuse.ch/downloads/ipblocklist.json'),
                fetchSecure('https://urlhaus.abuse.ch/downloads/json_online/'),
                fetchSecure('https://openphish.com/feed.txt')
            ]);

            currentFeed = [];
            if(cisa?.vulnerabilityTypes) cisa.vulnerabilityTypes.slice(0,10).forEach(i => currentFeed.push({type:'kev', severity:'critical', ioc:i.cveID, desc:i.vendorProject, src:'CISA KEV', date:i.dateAdded}));
            if(feodo) feodo.slice(0,10).forEach(i => currentFeed.push({type:'c2', severity:'high', ioc:i.ip, desc:'FeodoTracker', src:'Feodo', date:new Date().toISOString()}));
            if(urlhaus) urlhaus.slice(0,10).forEach(i => currentFeed.push({type:'malware', severity:'medium', ioc:i.url, desc:i.threat, src:'URLhaus', date:i.firstseen}));
            if(openphish) openphish.split('\n').filter(x=>x).slice(0,10).forEach(u => currentFeed.push({type:'phishing', severity:'high', ioc:u, desc:'OpenPhish', src:'OpenPhish', date:new Date().toISOString()}));

            renderFeed();
            document.getElementById('statTotal').textContent = currentFeed.length;
            document.getElementById('statCritical').textContent = currentFeed.filter(i=>i.severity==='critical').length;
        }

        function renderFeed() {
            const c = document.getElementById('feedContainer');
            c.innerHTML = currentFeed.map(i => `
                <div class="feed-item">
                    <div class="feed-ioc">${i.ioc}</div>
                    <div style="font-size:0.75rem; color:var(--text);">${i.desc}</div>
                    <div class="feed-meta">${i.src} • ${i.date?.split('T')[0]}</div>
                </div>
            `).join('');
        }

        // GRAPH
        function initGraph() {
            if(network) return;
            const container = document.getElementById('networkGraph');
            const data = { nodes: new vis.DataSet([{id:1, label:'IOC', color:{background:'var(--accent)'}}]), edges: new vis.DataSet([]) };
            network = new vis.Network(container, data, { physics: { stabilization: false }, nodes:{font:{color:'var(--text)'}} });
        }

        // CASES
        function createCase() {
            const name = document.getElementById('caseName').value;
            if(!name) return;
            cases.push({ id: Date.now().toString(), name, priority: 'medium', status: 'active', created: new Date().toISOString() });
            localStorage.setItem('kitsune_cases', JSON.stringify(cases));
            updateCases();
            closeModal('newCaseModal');
        }
        function updateCases() {
            const l = document.getElementById('caseList');
            document.getElementById('caseCount').textContent = cases.length;
            l.innerHTML = cases.map(c => `
                <div class="ow-inv-item" style="padding:8px 12px; border-bottom:1px solid var(--border);">
                    <div class="owi-body">
                        <div class="owi-title">${c.name}</div>
                        <div class="owi-meta"><span class="owi-tag">${c.status}</span></div>
                    </div>
                </div>
            `).join('');
        }

        // WATCHLIST
        function addToWatchlist() {
            const v = document.getElementById('watchlistInput').value;
            if(v && !watchlist.includes(v)) {
                watchlist.push(v);
                localStorage.setItem('kitsune_watchlist', JSON.stringify(watchlist));
                renderWatchlist();
                document.getElementById('watchlistInput').value = '';
            }
        }
        function renderWatchlist() {
            const d = document.getElementById('watchlistDisplay');
            d.innerHTML = watchlist.map(w => `<span class="watchlist-chip" onclick="removeFromWatchlist('${w}')">${w} <span style="color:var(--red)">✕</span></span>`).join('');
        }
        function removeFromWatchlist(w) {
            watchlist = watchlist.filter(x => x !== w);
            localStorage.setItem('kitsune_watchlist', JSON.stringify(watchlist));
            renderWatchlist();
        }

        // UTILS
        function showModal(id) { document.getElementById(id).classList.add('visible'); }
        function closeModal(id) { document.getElementById(id).classList.remove('visible'); }
        function saveApiKeys() {
            apiKeys = { abuse: document.getElementById('abuseKey').value, hibp: document.getElementById('hibpKey').value };
            localStorage.setItem('kitsune_apikeys', JSON.stringify(apiKeys));
            closeModal('apiKeysModal');
        }

        // INIT
        document.addEventListener('DOMContentLoaded', () => {
            loadTheme();
            updateCases();
            renderWatchlist();
            refreshFeeds();
            renderMITRE();
        });

        // MITRE RENDER
        function renderMITRE() {
            const g = document.getElementById('mitreGrid');
            if(g.children.length > 0) return;
            const tactics = ['Initial Access','Execution','Persistence','Privilege Escalation','Defense Evasion','Credential Access','Discovery','Lateral Movement','Collection','Exfiltration','C2'];
            tactics.forEach(t => {
                const d = document.createElement('div');
                d.style.background = 'var(--bg2)'; d.style.padding='10px'; d.style.border='1px solid var(--border)'; d.style.borderRadius='4px';
                d.innerHTML = `<div style="color:var(--accent); font-size:0.7rem; margin-bottom:5px;">${t}</div>`;
                g.appendChild(d);
            });
        }
    </script>
</body>
</html>
