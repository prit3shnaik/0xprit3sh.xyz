backend:
  name: github
  repo: prit3shnaik/0xprit3sh.xyz
  branch: main
  base_url: https://sveltia-cms-auth.prit3shnaik19.workers.dev
  auth_endpoint: /callback

media_folder: "static/images/uploads"
public_folder: "/images/uploads"

collections:

  - name: "blog"
    label: "Blog Posts"
    folder: "content/blog"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    fields:
      - { label: "Title",       name: "title",    widget: "string" }
      - { label: "Date",        name: "date",     widget: "datetime" }
      - { label: "Tags",        name: "tags",     widget: "list", allow_add: true }
      - { label: "TL;DR",      name: "tldr",     widget: "string", required: false }
      - { label: "Cover Image", name: "og_image", widget: "image",  required: false,
          hint: "1200x630px recommended — shows when shared on X, LinkedIn, Telegram" }
      - label: "Body"
        name: "body"
        widget: "markdown"
        buttons:
          - bold
          - italic
          - code
          - link
          - heading-one
          - heading-two
          - heading-three
          - quote
          - bulleted-list
          - numbered-list
          - code-block
        editor_components:
          - code-block
          - image

  - name: "osint"
    label: "OSINT Investigations"
    folder: "content/osint"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Title",      name: "title",    widget: "string" }
      - { label: "Date",       name: "date",     widget: "datetime" }
      - { label: "Tags",       name: "tags",     widget: "list", allow_add: true,
          hint: "Use: GEOINT, SOCMINT, HUMINT, C2, ACTOR, CTI" }
      - { label: "Node Color", name: "color",    widget: "color",
          default: "#00d4ff",  hint: "Color of this node in the OSINT workspace graph" }
      - { label: "Enable Map", name: "leaflet",  widget: "boolean", default: false }
      - { label: "TL;DR",     name: "tldr",     widget: "string",  required: false }
      - { label: "Status",     name: "status",   widget: "select",
          options: ["active", "closed", "ongoing"], default: "active" }
      - { label: "Cover Image", name: "og_image", widget: "image",   required: false,
          hint: "1200x630px — shows when shared on social media" }
      - label: "Graph Data"
        name: "graph_data"
        widget: "string"
        required: false
        hint: "Paste the JSON from graph-builder here (copy JSON button). Then add {{< graph >}} in body where you want the graph to appear."
      - label: "Body"
        name: "body"
        widget: "markdown"
        buttons:
          - bold
          - italic
          - code
          - link
          - heading-one
          - heading-two
          - heading-three
          - quote
          - bulleted-list
          - numbered-list
          - code-block
        editor_components:
          - code-block
          - image

  - name: "writeups"
    label: "Writeups"
    folder: "content/writeups"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Title",       name: "title",    widget: "string" }
      - { label: "Date",        name: "date",     widget: "datetime" }
      - { label: "Tags",        name: "tags",     widget: "list", allow_add: true }
      - { label: "Severity",    name: "severity", widget: "select",
          options: ["critical", "high", "medium", "low"], required: false }
      - { label: "Platform",    name: "platform", widget: "string", required: false,
          hint: "e.g. HackTheBox, Immunefi, Private bug bounty" }
      - { label: "TL;DR",      name: "tldr",     widget: "string", required: false }
      - { label: "Cover Image", name: "og_image", widget: "image",  required: false }
      - label: "Body"
        name: "body"
        widget: "markdown"
        buttons:
          - bold
          - italic
          - code
          - link
          - heading-one
          - heading-two
          - heading-three
          - quote
          - bulleted-list
          - numbered-list
          - code-block
        editor_components:
          - code-block
          - image

  - name: "pages"
    label: "Pages"
    files:

      - label: "Home"
        name: "home"
        file: "content/_index.md"
        fields:
          - { label: "Operator Name",  name: "operator",       widget: "string" }
          - { label: "Tagline",        name: "tagline",        widget: "string" }
          - { label: "Location",       name: "location",       widget: "string" }
          - { label: "Status",         name: "status",         widget: "string" }
          - { label: "Specialization", name: "specialization", widget: "string" }
          - { label: "Spec Detail",    name: "spec_detail",    widget: "string" }
          - { label: "Tools",          name: "tools",          widget: "string" }
          - { label: "Tools Detail",   name: "tools_detail",   widget: "string" }

      - label: "About"
        name: "about"
        file: "content/about.md"
        fields:
          - { label: "Title", name: "title", widget: "string" }
          - label: "Body"
            name: "body"
            widget: "markdown"
            buttons:
              - bold
              - italic
              - code
              - link
              - heading-one
              - heading-two
              - heading-three
              - quote
              - bulleted-list
              - numbered-list
              - code-block
            editor_components:
              - code-block
              - image

      - label: "Services"
        name: "services"
        file: "content/services.md"
        fields:
          - { label: "Title",       name: "title",       widget: "string" }
          - { label: "Description", name: "description", widget: "string", required: false }
          - label: "Body"
            name: "body"
            widget: "markdown"
            buttons:
              - bold
              - italic
              - code
              - link
              - heading-one
              - heading-two
              - heading-three
              - quote
              - bulleted-list
              - numbered-list
              - code-block
            editor_components:
              - code-block
              - image
