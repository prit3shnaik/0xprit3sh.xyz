name: Discord Alert Dispatcher

on:
  push:
    paths:
      - 'content/alerts/**'

jobs:
  notify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install yq & jq
        run: |
          sudo apt-get update
          sudo apt-get install -y jq
          sudo wget -qO /usr/local/bin/yq https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq

      - name: Get Changed Files
        id: files
        run: |
          FILES=$(jq -r '.commits[].added[]?, .commits[].modified[]?' "$GITHUB_EVENT_PATH" | grep '^content/alerts/' || true)

          echo "FILES:"
          echo "$FILES"

          if [ -z "$FILES" ]; then
            echo "files=" >> $GITHUB_OUTPUT
            exit 0
          fi

          echo "files<<EOF" >> $GITHUB_OUTPUT
          echo "$FILES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Send Alerts
        if: steps.files.outputs.files != ''
        run: |
          while read -r FILE; do
            echo "Processing $FILE"

            # --- Extract FRONTMATTER only ---
            FRONTMATTER=$(sed -n '/^---$/,/^---$/p' "$FILE" | sed '1d;$d')

            # --- Parse safely using yq ---
            TITLE=$(echo "$FRONTMATTER" | yq -r '.title // "New Alert"')
            SEV=$(echo "$FRONTMATTER" | yq -r '.severity // "low"' | tr '[:upper:]' '[:lower:]')
            TARGET=$(echo "$FRONTMATTER" | yq -r '.affected_systems // "Undisclosed"')
            TLP=$(echo "$FRONTMATTER" | yq -r '.tlp // "N/A"')
            ACTOR=$(echo "$FRONTMATTER" | yq -r '.alert_type // "Undisclosed"')
            TLDR=$(echo "$FRONTMATTER" | yq -r '.tldr // ""')

            # --- Fallback TLDR from body ---
            if [ -z "$TLDR" ] || [ "$TLDR" = "..." ]; then
              TLDR=$(sed '1,/^---$/d' "$FILE" | sed '1,/^---$/d' | tr '\n' ' ' | head -c 300)
            fi

            # --- Trim for Discord limits ---
            TITLE=$(echo "$TITLE" | head -c 200)
            TLDR=$(echo "$TLDR" | head -c 300)

            # --- Severity color ---
            case "$SEV" in
              "critical") COLOR=15548997; EMOJI="🚨";;
              "high")     COLOR=15105570; EMOJI="🟠";;
              "medium")   COLOR=15844367; EMOJI="🟡";;
              "info")     COLOR=3447003;  EMOJI="🔵";;
              *)          COLOR=3066993;  EMOJI="🔵";;
            esac

            URL="https://0xprit3sh.xyz"

            # --- Build JSON safely ---
            PAYLOAD=$(jq -n \
              --arg username "0xprit3sh Intel" \
              --arg avatar "https://0xprit3sh.xyz/logo.png" \
              --arg content "$EMOJI ALERT: $TITLE" \
              --arg desc "⚔️ Target: $TARGET\n\n📖 TL;DR:\n> $TLDR\n\n🌐 Full Details:\n$URL\n\n🔎 Severity: ${SEV^^} | TLP: $TLP\n\n📅 Date: $(date +'%d-%m-%y')\n\n⚔️ Threat Actor: $ACTOR" \
              --argjson color "$COLOR" \
              '{
                username: $username,
                avatar_url: $avatar,
                content: $content,
                embeds: [{
                  color: $color,
                  description: $desc,
                  footer: { text: "Cyber Intelligence & Educational Purposes" }
                }]
              }')

            echo "Sending alert..."

            RESPONSE=$(curl -s -w "\nHTTP_STATUS:%{http_code}\n" \
              -X POST \
              -H "Content-Type: application/json" \
              -d "$PAYLOAD" \
              "${{ secrets.DISCORD_WEBHOOK_URL }}")

            echo "$RESPONSE"

            STATUS=$(echo "$RESPONSE" | grep HTTP_STATUS | cut -d":" -f2)

            if [ "$STATUS" -ne 204 ]; then
              echo "❌ Failed (HTTP $STATUS)"
              exit 1
            else
              echo "✅ Sent"
            fi

          done <<< "${{ steps.files.outputs.files }}"