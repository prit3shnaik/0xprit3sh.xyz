name: Discord Alert Dispatcher

on:
  push:
    paths:
      - 'content/alerts/**'

jobs:
  notify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Get Changed Alert Files
        id: files
        run: |
          FILES=$(jq -r '.commits[].added[]?, .commits[].modified[]?' "$GITHUB_EVENT_PATH" | grep '^content/alerts/' || true)

          if [ -z "$FILES" ]; then
            echo "No alert files changed."
            echo "files=" >> $GITHUB_OUTPUT
            exit 0
          fi

          echo "Changed files:"
          echo "$FILES"

          # Save for next step
          echo "files<<EOF" >> $GITHUB_OUTPUT
          echo "$FILES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Send Alerts to Discord
        if: steps.files.outputs.files != ''
        run: |
          while read -r FILE; do
            echo "Processing: $FILE"

            # --- Extract Frontmatter ---
            TITLE=$(grep "^title:" "$FILE" | cut -d":" -f2- | sed 's/^ //;s/"//g')
            SEV=$(grep "^severity:" "$FILE" | cut -d":" -f2 | xargs | tr '[:upper:]' '[:lower:]')
            TARGET=$(grep "^affected_systems:" "$FILE" | cut -d":" -f2- | xargs)
            TLP=$(grep "^tlp:" "$FILE" | cut -d":" -f2 | xargs)
            ACTOR=$(grep "^alert_type:" "$FILE" | cut -d":" -f2- | xargs)
            TLDR=$(grep "^tldr:" "$FILE" | cut -d":" -f2- | xargs)

            # --- Fallback TLDR ---
            if [ -z "$TLDR" ]; then
              TLDR=$(sed '1,/---/d' "$FILE" | head -c 200 | tr '\n' ' ')
            fi

            # --- Severity Color ---
            case "$SEV" in
              "critical") COLOR=15548997; EMOJI="🚨";;
              "high")     COLOR=15105570; EMOJI="🟠";;
              "medium")   COLOR=15844367; EMOJI="🟡";;
              *)          COLOR=3066993;  EMOJI="🔵";;
            esac

            URL="https://0xprit3sh.xyz"

            # --- Build JSON safely ---
            PAYLOAD=$(jq -n \
              --arg username "0xprit3sh Intel" \
              --arg avatar "https://0xprit3sh.xyz/logo.png" \
              --arg content "$EMOJI ALERT ___ $TITLE ⚠️ >>>>" \
              --arg desc "⚔️ Target: ${TARGET:-Undisclosed}\n\n📖 TL;DR:\n> $TLDR\n\n🌐 Full Details:\n$URL\n\n🔎 Severity: ${SEV^^} | TLP: $TLP\n\n📅 Date: $(date +'%d-%m-%y')\n\n⚔️ Threat Actor: ${ACTOR:-Undisclosed}" \
              --argjson color "$COLOR" \
              '{
                username: $username,
                avatar_url: $avatar,
                content: $content,
                embeds: [{
                  color: $color,
                  description: $desc,
                  footer: { text: "Cyber Intelligence & Educational Purposes" }
                }]
              }')

            echo "Sending alert for: $TITLE"
            echo "$PAYLOAD"

            # --- Send with retry ---
            for i in 1 2 3; do
              RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" \
                -X POST \
                -H "Content-Type: application/json" \
                -d "$PAYLOAD" \
                "${{ secrets.DISCORD_WEBHOOK_URL }}")

              if [ "$RESPONSE" -eq 204 ]; then
                echo "✅ Sent successfully"
                break
              else
                echo "⚠️ Failed (HTTP $RESPONSE), retry $i..."
                sleep 2
              fi
            done

          done <<< "${{ steps.files.outputs.files }}"