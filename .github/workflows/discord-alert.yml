name: Discord Alert Dispatcher

on:
  push:
    paths:
      - 'content/alerts/**'

jobs:
  notify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install deps
        run: npm install gray-matter axios

      - name: Parse latest alert + send
        run: |
          node <<'EOF'
          const fs = require('fs');
          const path = require('path');
          const matter = require('gray-matter');
          const axios = require('axios');

          const alertsDir = "content/alerts";

          // 🔥 Get latest file by modified time
          const files = fs.readdirSync(alertsDir)
            .map(file => ({
              name: file,
              time: fs.statSync(path.join(alertsDir, file)).mtime.getTime()
            }))
            .sort((a, b) => b.time - a.time);

          if (!files.length) {
            console.log("No alert files found");
            process.exit(0);
          }

          const latestFile = path.join(alertsDir, files[0].name);
          console.log("Using latest file:", latestFile);

          const raw = fs.readFileSync(latestFile, 'utf-8');
          const { data, content } = matter(raw);

          let title = data.title || "New Alert";
          let sev = (data.severity || "low").toLowerCase();
          let target = data.affected_systems || "Undisclosed";
          let tlp = data.tlp || "N/A";
          let actor = data.alert_type || "Undisclosed";
          let tldr = data.tldr || "";

          // 🔥 FIX TLDR
          if (!tldr || tldr.trim() === "" || tldr === "...") {
            tldr = content.replace(/\n/g, " ").slice(0, 300);
          }

          title = title.slice(0, 200);
          tldr = tldr.slice(0, 300);

          const severityMap = {
            critical: [15548997, "🚨"],
            high: [15105570, "🟠"],
            medium: [15844367, "🟡"],
            info: [3447003, "🔵"],
            low: [3066993, "🔵"]
          };

          const [color, emoji] = severityMap[sev] || severityMap["low"];

          const payload = {
            username: "0xprit3sh Intel",
            avatar_url: "https://0xprit3sh.xyz/logo.png",
            content: `${emoji} ALERT: ${title}`,
            embeds: [{
              color,
              description:
`⚔️ Target: ${target}

📖 TL;DR:
> ${tldr}

🌐 Full Details:
https://0xprit3sh.xyz

🔎 Severity: ${sev.toUpperCase()} | TLP: ${tlp}

📅 Date: ${new Date().toLocaleDateString()}

⚔️ Threat Actor: ${actor}`,
              footer: {
                text: "Cyber Intelligence & Educational Purposes"
              }
            }]
          };

          (async () => {
            try {
              const res = await axios.post(process.env.DISCORD_WEBHOOK_URL, payload);
              console.log("✅ Sent:", res.status);
            } catch (err) {
              console.error("❌ Error:", err.response?.data || err.message);
              process.exit(1);
            }
          })();
          EOF
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}