name: Discord Alert Dispatcher

on:
  push:
    paths:
      - 'content/alerts/**'

jobs:
  notify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install gray-matter
        run: npm install gray-matter

      - name: Get Changed Files
        id: files
        run: |
          FILES=$(jq -r '.commits[].added[]?, .commits[].modified[]?' "$GITHUB_EVENT_PATH" | grep '^content/alerts/' || true)

          echo "FILES:"
          echo "$FILES"

          if [ -z "$FILES" ]; then
            echo "files=" >> $GITHUB_OUTPUT
            exit 0
          fi

          echo "files<<EOF" >> $GITHUB_OUTPUT
          echo "$FILES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Parse + Send
        if: steps.files.outputs.files != ''
        run: |
          npm install axios

          node <<'EOF'
          const fs = require('fs');
          const matter = require('gray-matter');
          const axios = require('axios');

          const files = `${{ steps.files.outputs.files }}`.trim().split('\n');

          for (const file of files) {
            console.log("Processing:", file);

            const raw = fs.readFileSync(file, 'utf-8');
            const { data, content } = matter(raw);

            let title = data.title || "New Alert";
            let sev = (data.severity || "low").toLowerCase();
            let target = data.affected_systems || "Undisclosed";
            let tlp = data.tlp || "N/A";
            let actor = data.alert_type || "Undisclosed";
            let tldr = data.tldr || "";

            // 🔥 FIX: fallback TLDR properly
            if (!tldr || tldr.trim() === "" || tldr === "...") {
              tldr = content.replace(/\n/g, " ").slice(0, 300);
            }

            // Trim
            title = title.slice(0, 200);
            tldr = tldr.slice(0, 300);

            const severityMap = {
              critical: [15548997, "🚨"],
              high: [15105570, "🟠"],
              medium: [15844367, "🟡"],
              info: [3447003, "🔵"],
              low: [3066993, "🔵"]
            };

            const [color, emoji] = severityMap[sev] || severityMap["low"];

            const payload = {
              username: "0xprit3sh Intel",
              avatar_url: "https://0xprit3sh.xyz/logo.png",
              content: `${emoji} ALERT: ${title}`,
              embeds: [{
                color,
                description:
`⚔️ Target: ${target}

📖 TL;DR:
> ${tldr}

🌐 Full Details:
https://0xprit3sh.xyz

🔎 Severity: ${sev.toUpperCase()} | TLP: ${tlp}

📅 Date: ${new Date().toLocaleDateString()}

⚔️ Threat Actor: ${actor}`,
                footer: {
                  text: "Cyber Intelligence & Educational Purposes"
                }
              }]
            };

            try {
              const res = await axios.post(process.env.DISCORD_WEBHOOK_URL, payload);
              console.log("✅ Sent:", res.status);
            } catch (err) {
              console.error("❌ Error:", err.response?.data || err.message);
              process.exit(1);
            }
          }
          EOF
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}