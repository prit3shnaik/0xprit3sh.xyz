name: Discord Alert Dispatcher

on:
  push:
    paths:
      - 'content/alerts/**'

jobs:
  notify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      # 🔥 TEST webhook (remove later)
      - name: Test Discord Webhook
        run: |
          curl -X POST -H "Content-Type: application/json" \
          -d '{"content":"✅ Webhook test from GitHub Actions"}' \
          "${{ secrets.DISCORD_WEBHOOK_URL }}"

      - name: Get Changed Alert Files
        id: files
        run: |
          FILES=$(jq -r '.commits[].added[]?, .commits[].modified[]?' "$GITHUB_EVENT_PATH" | grep '^content/alerts/' || true)

          echo "Detected files:"
          echo "$FILES"

          if [ -z "$FILES" ]; then
            echo "No alert files found."
            echo "files=" >> $GITHUB_OUTPUT
            exit 0
          fi

          echo "files<<EOF" >> $GITHUB_OUTPUT
          echo "$FILES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Send Alerts to Discord
        if: steps.files.outputs.files != ''
        run: |
          while read -r FILE; do
            echo "-----------------------------"
            echo "Processing: $FILE"

            # --- Extract fields (robust parsing) ---
            TITLE=$(sed -n 's/^title:[[:space:]]*//p' "$FILE" | head -n1)
            SEV=$(sed -n 's/^severity:[[:space:]]*//p' "$FILE" | tr '[:upper:]' '[:lower:]' | head -n1)
            TARGET=$(sed -n 's/^affected_systems:[[:space:]]*//p' "$FILE" | head -n1)
            TLP=$(sed -n 's/^tlp:[[:space:]]*//p' "$FILE" | head -n1)
            ACTOR=$(sed -n 's/^alert_type:[[:space:]]*//p' "$FILE" | head -n1)
            TLDR=$(sed -n 's/^tldr:[[:space:]]*//p' "$FILE" | head -n1)

            # --- Defaults ---
            TITLE=${TITLE:-"New Alert"}
            SEV=${SEV:-"low"}
            TARGET=${TARGET:-"Undisclosed"}
            TLP=${TLP:-"N/A"}
            ACTOR=${ACTOR:-"Undisclosed"}

            # --- Fallback TLDR ---
            if [ -z "$TLDR" ]; then
              TLDR=$(sed '1,/---/d' "$FILE" | tr '\n' ' ' | head -c 300)
            fi

            # --- Trim to Discord limits ---
            TITLE=$(echo "$TITLE" | head -c 200)
            TLDR=$(echo "$TLDR" | head -c 300)

            # --- Severity mapping ---
            case "$SEV" in
              "critical") COLOR=15548997; EMOJI="🚨";;
              "high")     COLOR=15105570; EMOJI="🟠";;
              "medium")   COLOR=15844367; EMOJI="🟡";;
              *)          COLOR=3066993;  EMOJI="🔵";;
            esac

            URL="https://0xprit3sh.xyz"

            # --- Build JSON safely ---
            PAYLOAD=$(jq -n \
              --arg username "0xprit3sh Intel" \
              --arg avatar "https://0xprit3sh.xyz/logo.png" \
              --arg content "$EMOJI ALERT: $TITLE" \
              --arg desc "⚔️ Target: $TARGET\n\n📖 TL;DR:\n> $TLDR\n\n🌐 Full Details:\n$URL\n\n🔎 Severity: ${SEV^^} | TLP: $TLP\n\n📅 Date: $(date +'%d-%m-%y')\n\n⚔️ Threat Actor: $ACTOR" \
              --argjson color "$COLOR" \
              '{
                username: $username,
                avatar_url: $avatar,
                content: $content,
                embeds: [{
                  color: $color,
                  description: $desc,
                  footer: { text: "Cyber Intelligence & Educational Purposes" }
                }]
              }')

            echo "---- PAYLOAD ----"
            echo "$PAYLOAD"

            # --- Send with FULL DEBUG ---
            RESPONSE=$(curl -s -w "\nHTTP_STATUS:%{http_code}\n" \
              -X POST \
              -H "Content-Type: application/json" \
              -d "$PAYLOAD" \
              "${{ secrets.DISCORD_WEBHOOK_URL }}")

            echo "---- DISCORD RESPONSE ----"
            echo "$RESPONSE"
            echo "--------------------------"

            # --- Fail if not successful ---
            STATUS=$(echo "$RESPONSE" | grep HTTP_STATUS | cut -d":" -f2)

            if [ "$STATUS" -ne 204 ]; then
              echo "❌ Failed to send alert (HTTP $STATUS)"
              exit 1
            else
              echo "✅ Alert sent successfully"
            fi

          done <<< "${{ steps.files.outputs.files }}"