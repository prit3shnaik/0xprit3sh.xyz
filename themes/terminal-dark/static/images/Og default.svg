<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <!-- Background -->
  <rect width="1200" height="630" fill="#090909"/>
 
  <!-- Subtle grid -->
  <defs>
    <pattern id="grid" width="30" height="30" patternUnits="userSpaceOnUse">
      <circle cx="15" cy="15" r="0.8" fill="#1a1a1a"/>
    </pattern>
  </defs>
  <rect width="1200" height="630" fill="url(#grid)"/>
 
  <!-- Left accent bar -->
  <rect x="0" y="0" width="4" height="630" fill="#00ff41"/>
 
  <!-- Top bar -->
  <rect x="0" y="0" width="1200" height="1" fill="#1e1e1e"/>
  <rect x="0" y="629" width="1200" height="1" fill="#1e1e1e"/>
 
  <!-- Main title -->
  <text x="340" y="220" font-family="'JetBrains Mono', 'Courier New', monospace" font-size="72" font-weight="700" fill="#e6edf3">0xprit3sh</text>
 
  <!-- Subtitle -->
  <text x="340" y="280" font-family="'JetBrains Mono', 'Courier New', monospace" font-size="22" fill="#00ff41">Red Team · VAPT · OSINT · Web3 Security</text>
 
  <!-- Divider line -->
  <rect x="340" y="308" width="780" height="1" fill="#1e1e1e"/>
 
  <!-- Tags row -->
  <g transform="translate(340, 340)">
    <!-- Tag 1 -->
    <rect x="0" y="0" width="130" height="32" rx="4" fill="rgba(0,212,255,0.08)" stroke="rgba(0,212,255,0.25)" stroke-width="1"/>
    <text x="65" y="21" font-family="monospace" font-size="13" fill="#00d4ff" text-anchor="middle">Smart Contracts</text>
    <!-- Tag 2 -->
    <rect x="145" y="0" width="100" height="32" rx="4" fill="rgba(255,68,68,0.08)" stroke="rgba(255,68,68,0.2)" stroke-width="1"/>
    <text x="195" y="21" font-family="monospace" font-size="13" fill="#ff4444" text-anchor="middle">DeFi Exploits</text>
    <!-- Tag 3 -->
    <rect x="260" y="0" width="90" height="32" rx="4" fill="rgba(188,140,255,0.08)" stroke="rgba(188,140,255,0.2)" stroke-width="1"/>
    <text x="305" y="21" font-family="monospace" font-size="13" fill="#bc8cff" text-anchor="middle">DarkWeb CTI</text>
    <!-- Tag 4 -->
    <rect x="365" y="0" width="80" height="32" rx="4" fill="rgba(0,255,65,0.08)" stroke="rgba(0,255,65,0.2)" stroke-width="1"/>
    <text x="405" y="21" font-family="monospace" font-size="13" fill="#00ff41" text-anchor="middle">SOCMINT</text>
  </g>
 
  <!-- URL / domain -->
  <text x="340" y="430" font-family="monospace" font-size="18" fill="#484f58">0xprit3sh.xyz</text>
 
  <!-- Bottom terminal line -->
  <text x="80" y="580" font-family="monospace" font-size="14" fill="#00ff41">root@0xprit3sh:~$</text>
  <text x="280" y="580" font-family="monospace" font-size="14" fill="#484f58">// Goa, India · Available for engagements</text>
 
  <!-- Right side decorative element -->
  <g opacity="0.06">
    <circle cx="1100" cy="315" r="180" fill="none" stroke="#00ff41" stroke-width="1"/>
    <circle cx="1100" cy="315" r="120" fill="none" stroke="#00ff41" stroke-width="1"/>
    <circle cx="1100" cy="315" r="60" fill="none" stroke="#00ff41" stroke-width="1"/>
    <line x1="920" y1="315" x2="940" y2="315" stroke="#00ff41" stroke-width="1"/>
    <line x1="1260" y1="315" x2="1280" y2="315" stroke="#00ff41" stroke-width="1"/>
    <line x1="1100" y1="135" x2="1100" y2="155" stroke="#00ff41" stroke-width="1"/>
    <line x1="1100" y1="475" x2="1100" y2="495" stroke="#00ff41" stroke-width="1"/>
    <circle cx="1100" cy="315" r="8" fill="#00ff41"/>
  </g>
</svg>
 