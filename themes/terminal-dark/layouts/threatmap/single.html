{{ define "main" }}
{{ $actors := where .Site.RegularPages "Section" "eq" "actors" }}

<!-- Dependencies: Leaflet & Fonts -->
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

<!-- 1. DATA INJECTION (Expanded to include IOCs/Image from your template) -->
<script>
window.ACTOR_DATA = [{{ range $actors }}{
  title:      "{{ .Title | safeJS }}",
  slug:       "{{ .File.BaseFileName | safeJS }}",
  url:        "{{ .Permalink | safeJS }}",
  origin:     "{{ .Params.origin      | default "" | safeJS }}",
  category:   "{{ .Params.category    | default "Unknown" | safeJS }}",
  threat:     "{{ .Params.threat_level| default "medium" | safeJS }}",
  status:     "{{ .Params.status      | default "unknown" | safeJS }}",
  tldr:       "{{ .Params.tldr        | default "" | safeJS }}",
  motivation: "{{ .Params.motivation  | default "" | safeJS }}",
  first_seen: "{{ .Params.first_seen  | default "" | safeJS }}",
  last_seen:  "{{ .Params.last_seen   | default "" | safeJS }}",
  ttps:       {{ if .Params.ttps }}{{ .Params.ttps | jsonify }}{{ else }}[]{{ end }},
  targets:    {{ if .Params.targets }}{{ .Params.targets | jsonify }}{{ else }}[]{{ end }},
  tools:      {{ if .Params.tools_used }}{{ .Params.tools_used | jsonify }}{{ else }}[]{{ end }},
  aliases:    {{ if .Params.aliases }}{{ .Params.aliases | jsonify }}{{ else }}[]{{ end }},
  iocs:       {{ if .Params.iocs }}{{ .Params.iocs | jsonify }}{{ else }}[]{{ end }},
  image:      "{{ if .Params.image }}{{ .Params.image | relURL }}{{ else }}{{ end }}",
},{{ end }}];
</script>

<!-- 2. STYLES (Clean SOC Theme) -->
<style>
:root {
  --bg-dark: #0b0f19;
  --bg-panel: #111827;
  --bg-hover: #1f2937;
  --border: #1f2937;
  --text-main: #e2e8f0;
  --text-muted: #94a3b8;
  --accent: #38bdf8;
  --accent-dim: rgba(56, 189, 248, 0.1);
  
  --threat-crit: #f43f5e;
  --threat-high: #f59e0b;
  --threat-med: #10b981;
  --threat-low: #64748b;
  
  --font-ui: 'Inter', system-ui, sans-serif;
  --font-mono: 'JetBrains Mono', monospace;
  --nav-h: 56px;
}

* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--bg-dark); color: var(--text-main); font-family: var(--font-ui); overflow: hidden; }

/* LAYOUT */
#dashboard {
  position: fixed; inset: 0; top: var(--nav-h);
  display: flex; flex-direction: column;
  background: var(--bg-dark);
}

/* TOP BAR */
#top-bar {
  height: 48px; display: flex; align-items: center; justify-content: space-between;
  padding: 0 20px; background: var(--bg-panel); border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
#top-bar .left { display: flex; align-items: center; gap: 16px; }
#top-bar .title { font-weight: 700; font-size: 0.9rem; letter-spacing: 0.05em; color: var(--text-main); }
#top-bar .title span { color: var(--accent); }
#top-bar .stats { display: flex; gap: 16px; font-size: 0.75rem; font-family: var(--font-mono); }
.stat-item { display: flex; align-items: center; gap: 6px; color: var(--text-muted); }
.stat-item b { color: var(--text-main); }
.dot { width: 6px; height: 6px; border-radius: 50%; }
.dot.crit { background: var(--threat-crit); }
.dot.high { background: var(--threat-high); }

/* MAIN AREA */
#main-area { flex: 1; display: flex; overflow: hidden; }

/* MAP */
#map-container { flex: 1; position: relative; background: var(--bg-dark); }
#map { width: 100%; height: 100%; z-index: 1; }
.leaflet-container { background: var(--bg-dark) !important; }
.leaflet-control-zoom { border: 1px solid var(--border) !important; border-radius: 6px !important; overflow: hidden; box-shadow: none !important; }
.leaflet-control-zoom a { background: var(--bg-panel) !important; color: var(--accent) !important; border-color: var(--border) !important; width: 32px !important; height: 32px !important; line-height: 32px !important; font-size: 16px !important; }
.leaflet-control-zoom a:hover { background: var(--bg-hover) !important; }
.leaflet-control-attribution { display: none !important; }

/* HUD OVERLAY */
.map-hud { position: absolute; top: 16px; left: 16px; z-index: 500; pointer-events: none; }
.hud-card { background: rgba(17, 24, 39, 0.8); backdrop-filter: blur(8px); border: 1px solid var(--border); padding: 8px 12px; border-radius: 6px; font-size: 0.7rem; color: var(--text-muted); font-family: var(--font-mono); }

/* SIDEBAR */
#sidebar {
  width: 360px; background: var(--bg-panel); border-left: 1px solid var(--border);
  display: flex; flex-direction: column; flex-shrink: 0;
  transition: width 0.3s ease;
}

/* SIDEBAR LIST */
.sidebar-header { padding: 16px; border-bottom: 1px solid var(--border); }
.search-input {
  width: 100%; background: var(--bg-dark); border: 1px solid var(--border); color: var(--text-main);
  padding: 10px 12px; border-radius: 6px; font-size: 0.85rem; outline: none;
  font-family: var(--font-ui); transition: border-color 0.2s;
}
.search-input:focus { border-color: var(--accent); }
.filter-row { display: flex; gap: 8px; margin-top: 10px; }
.filter-btn {
  flex: 1; background: transparent; border: 1px solid var(--border); color: var(--text-muted);
  padding: 6px; border-radius: 4px; font-size: 0.7rem; cursor: pointer; transition: all 0.2s;
}
.filter-btn:hover, .filter-btn.active { background: var(--accent-dim); border-color: var(--accent); color: var(--accent); }

.actor-list { flex: 1; overflow-y: auto; padding: 8px; }
.actor-list::-webkit-scrollbar { width: 4px; }
.actor-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

.actor-item {
  padding: 12px; margin-bottom: 4px; border-radius: 6px; cursor: pointer;
  border-left: 3px solid transparent; transition: all 0.2s;
}
.actor-item:hover { background: rgba(255,255,255,0.03); }
.actor-item.active { background: var(--accent-dim); border-left-color: var(--accent); }
.item-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 4px; }
.item-name { font-weight: 600; font-size: 0.9rem; color: var(--text-main); }
.item-badge { font-size: 0.65rem; padding: 2px 6px; border-radius: 4px; font-weight: 600; }
.badge.crit { background: rgba(244,63,94,0.15); color: var(--threat-crit); }
.badge.high { background: rgba(245,158,11,0.15); color: var(--threat-high); }
.badge.med { background: rgba(16,185,129,0.15); color: var(--threat-med); }
.item-meta { font-size: 0.75rem; color: var(--text-muted); display: flex; gap: 8px; align-items: center; }
.status-dot { width: 6px; height: 6px; border-radius: 50%; }
.status-active { background: var(--threat-crit); box-shadow: 0 0 4px var(--threat-crit); }
.status-monitoring { background: var(--threat-high); }
.status-dormant { background: var(--threat-low); }

/* SIDEBAR DETAIL (Slide-over) */
#detail-panel {
  position: absolute; inset: 0; background: var(--bg-panel); z-index: 600;
  transform: translateX(100%); transition: transform 0.25s cubic-bezier(0.4,0,0.2,1);
  display: flex; flex-direction: column; border-left: 1px solid var(--border);
}
#detail-panel.open { transform: translateX(0); }
.detail-header {
  padding: 16px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 12px;
}
#back-btn {
  background: none; border: none; color: var(--accent); cursor: pointer; font-size: 0.85rem;
  display: flex; align-items: center; gap: 4px; padding: 4px 8px; border-radius: 4px;
}
#back-btn:hover { background: rgba(56,189,248,0.1); }
.detail-content { flex: 1; overflow-y: auto; padding: 16px; }
.d-title { font-size: 1.1rem; font-weight: 700; margin-bottom: 8px; line-height: 1.3; }
.d-badges { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 16px; }
.d-section { margin-bottom: 16px; }
.d-label { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.05em; color: var(--accent); margin-bottom: 6px; font-weight: 600; }
.d-text { font-size: 0.85rem; color: var(--text-muted); line-height: 1.6; }
.d-tags { display: flex; flex-wrap: wrap; gap: 6px; }
.d-tag { font-size: 0.75rem; background: var(--bg-hover); padding: 4px 8px; border-radius: 4px; color: var(--text-main); border: 1px solid var(--border); }
.d-link {
  display: inline-block; margin-top: 12px; padding: 8px 12px; background: var(--accent);
  color: var(--bg-dark); font-weight: 600; border-radius: 6px; text-decoration: none; font-size: 0.85rem;
}
.d-link:hover { opacity: 0.9; }

/* MARKERS */
.threat-marker { position: relative; display: flex; align-items: center; justify-content: center; }
.marker-shape {
  width: 12px; height: 12px; position: relative; z-index: 2; transition: transform 0.2s;
  box-shadow: 0 0 8px rgba(0,0,0,0.5);
}
.threat-marker:hover .marker-shape { transform: scale(1.3); }
.shape-nation { clip-path: polygon(50% 0%, 100% 50%, 50% 100%, 0% 50%); background: var(--threat-crit); }
.shape-criminal { border-radius: 50%; background: var(--threat-high); }
.shape-other { border-radius: 2px; background: var(--threat-med); }
.marker-pulse {
  position: absolute; inset: -6px; border-radius: 50%; border: 1px solid currentColor; opacity: 0.4;
  animation: pulse 2.5s infinite;
}
@keyframes pulse { 0% { transform: scale(0.8); opacity: 0.4; } 100% { transform: scale(2.2); opacity: 0; } }
.marker-selected .marker-shape { transform: scale(1.5); box-shadow: 0 0 12px currentColor; }
.marker-dimmed { opacity: 0.15; transition: opacity 0.3s; }
.marker-dimmed:hover { opacity: 0.6; }

/* ARCS */
.threat-arc { stroke-dasharray: 6, 8; animation: dash 1.5s linear infinite; }
@keyframes dash { to { stroke-dashoffset: -28; } }

/* RESPONSIVE */
@media (max-width: 900px) {
  #sidebar { width: 280px; }
}
@media (max-width: 600px) {
  #main-area { flex-direction: column; }
  #sidebar { width: 100%; height: 40%; border-left: none; border-top: 1px solid var(--border); }
  #map-container { height: 60%; }
}
</style>

<!-- 3. LAYOUT -->

<!-- 4. JAVASCRIPT ENGINE -->
<script>
const CONFIG = {
  colors: { crit: '#f43f5e', high: '#f59e0b', med: '#10b981', low: '#64748b', accent: '#38bdf8' },
  map: { center: [20, 10], zoom: 2, minZoom: 2, maxZoom: 6 }
};

const STATE = {
  map: null,
  markers: {},
  arcs: [],
  selectedSlug: null,
  filter: 'all',
  searchQuery: ''
};

// COORDINATE DICTIONARY
const COORDS = {
  "china": [35.86, 104.19], "north korea": [40.33, 127.51], "dprk": [40.33, 127.51],
  "south korea": [37.56, 126.97], "japan": [36.20, 138.25], "vietnam": [14.05, 108.27],
  "india": [20.59, 78.96], "pakistan": [30.37, 69.34], "iran": [32.42, 53.68],
  "russia": [61.52, 105.31], "ukraine": [48.37, 31.16], "belarus": [53.70, 27.95],
  "germany": [51.16, 10.45], "france": [46.22, 2.21], "uk": [55.37, -3.43], "united kingdom": [55.37, -3.43],
  "usa": [37.09, -95.71], "united states": [37.09, -95.71], "canada": [56.13, -106.34],
  "brazil": [-14.23, -51.92], "nigeria": [9.08, 8.67], "south africa": [-28.03, 26.32],
  "australia": [-25.27, 133.77], "israel": [31.04, 34.85], "turkey": [38.96, 35.24],
  "unknown": [20, 15], "global": [20, 15]
};

const TARGET_COORDS = {
  "united states": [37.09, -95.71], "usa": [37.09, -95.71], "europe": [50.00, 10.00],
  "south korea": [37.56, 126.97], "japan": [36.20, 138.25], "india": [20.59, 78.96],
  "financial": [40.71, -74.01], "government": [38.89, -77.03], "defense": [38.89, -77.03],
  "healthcare": [51.50, -0.12], "energy": [48.86, 2.35], "technology": [37.38, -122.08]
};

function resolveCoords(name, fallback = [20, 15]) {
  if (!name) return fallback;
  const key = name.toLowerCase().trim();
  if (COORDS[key]) return COORDS[key];
  for (const [k, v] of Object.entries(COORDS)) {
    if (key.includes(k) && k.length > 3) return v;
  }
  return fallback;
}

function resolveTargetCoords(name) {
  if (!name) return null;
  const key = name.toLowerCase().trim();
  for (const [k, v] of Object.entries(TARGET_COORDS)) {
    if (key.includes(k)) return v;
  }
  return resolveCoords(name, null);
}

function initMap() {
  STATE.map = L.map('map', {
    center: CONFIG.map.center,
    zoom: CONFIG.map.zoom,
    minZoom: CONFIG.map.minZoom,
    maxZoom: CONFIG.map.maxZoom,
    zoomControl: true,
    attributionControl: false,
    dragging: true,        // UNLOCKED
    touchZoom: true,
    scrollWheelZoom: true,
    doubleClickZoom: false,
    boxZoom: false,
    keyboard: false,
    worldCopyJump: true
  });

  L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
    subdomains: 'abcd', maxZoom: 19
  }).addTo(STATE.map);

  STATE.map.on('mousemove', e => {
    document.getElementById('coords-display').textContent = `LAT ${e.latlng.lat.toFixed(2)} · LNG ${e.latlng.lng.toFixed(2)}`;
  });

  renderData();
  window.addEventListener('resize', () => STATE.map.invalidateSize());
}

function renderData() {
  const listEl = document.getElementById('actor-list');
  listEl.innerHTML = '';
  
  window.ACTOR_DATA.forEach((actor, idx) => {
    // Sidebar Item
    const row = document.createElement('div');
    row.className = 'actor-item';
    row.dataset.slug = actor.slug;
    row.dataset.category = (actor.category || '').toLowerCase();
    row.dataset.threat = (actor.threat || 'medium').toLowerCase();
    row.dataset.status = (actor.status || '').toLowerCase();
    
    const badgeClass = actor.threat === 'critical' ? 'crit' : actor.threat === 'high' ? 'high' : 'med';
    const statusClass = actor.status === 'active' ? 'status-active' : actor.status === 'monitoring' ? 'status-monitoring' : 'status-dormant';
    
    row.innerHTML = `
      <div class="item-top">
        <span class="item-name">${actor.title}</span>
        <span class="item-badge ${badgeClass}">${actor.threat.toUpperCase()}</span>
      </div>
      <div class="item-meta">
        <span><span class="status-dot ${statusClass}"></span>${actor.status}</span>
        <span>·</span>
        <span>${actor.category}</span>
        <span>·</span>
        <span>${actor.origin || 'Unknown'}</span>
      </div>
    `;
    row.addEventListener('click', () => selectActor(actor.slug));
    listEl.appendChild(row);

    // Map Marker
    const coords = resolveCoords(actor.origin);
    const jitter = [(idx % 5) * 0.8, (idx % 3) * 0.6];
    const lat = coords[0] + jitter[0];
    const lng = coords[1] + jitter[1];
    const cat = (actor.category || '').toLowerCase();
    const shapeClass = cat.includes('nation') ? 'shape-nation' : cat.includes('criminal') || cat.includes('ransom') ? 'shape-criminal' : 'shape-other';
    const color = CONFIG.colors[(actor.threat || 'medium').toLowerCase()] || CONFIG.colors.med;

    const icon = L.divIcon({
      className: `threat-marker marker-${(actor.threat || 'medium').toLowerCase()}`,
      html: `<div class="marker-shape ${shapeClass}" style="background:${color}"></div><div class="marker-pulse" style="color:${color}"></div>`,
      iconSize: [20, 20],
      iconAnchor: [10, 10]
    });

    const marker = L.marker([lat, lng], { icon }).addTo(STATE.map);
    marker.on('click', () => selectActor(actor.slug));
    
    STATE.markers[actor.slug] = { marker, actor, color };
  });

  // Draw Arcs
  window.ACTOR_DATA.forEach(actor => {
    const src = resolveCoords(actor.origin);
    if (!actor.targets || !actor.targets.length) return;
    actor.targets.slice(0, 3).forEach(target => {
      const dest = resolveTargetCoords(target);
      if (!dest) return;
      drawArc(src, dest, STATE.markers[actor.slug].color);
    });
  });

  updateStats();
  applyFilters();
}

function drawArc(start, end, color) {
  const points = [];
  const steps = 40;
  const midLat = (start[0] + end[0]) / 2;
  const midLng = (start[1] + end[1]) / 2;
  const dist = Math.sqrt(Math.pow(end[0]-start[0],2) + Math.pow(end[1]-start[1],2));
  const curvature = Math.min(dist * 0.3, 15);

  for (let i = 0; i <= steps; i++) {
    const t = i / steps;
    const lat = (1-t)*(1-t)*start[0] + 2*(1-t)*t*(midLat + curvature) + t*t*end[0];
    const lng = (1-t)*(1-t)*start[1] + 2*(1-t)*t*midLng + t*t*end[1];
    points.push([lat, lng]);
  }

  const arc = L.polyline(points, {
    color: color, weight: 1.5, opacity: 0.35, className: 'threat-arc', interactive: false
  }).addTo(STATE.map);
  STATE.arcs.push(arc);
}

function selectActor(slug) {
  STATE.selectedSlug = slug;
  const actor = window.ACTOR_DATA.find(a => a.slug === slug);
  if (!actor) return;

  document.querySelectorAll('.actor-item').forEach(r => r.classList.toggle('active', r.dataset.slug === slug));
  
  Object.values(STATE.markers).forEach(m => {
    const el = m.marker.getElement();
    if (!el) return;
    if (m.actor.slug === slug) {
      el.classList.add('marker-selected'); el.classList.remove('marker-dimmed');
    } else {
      el.classList.remove('marker-selected'); el.classList.add('marker-dimmed');
    }
  });
  
  STATE.arcs.forEach(arc => arc.setStyle({ opacity: 0.15 }));
  
  const coords = resolveCoords(actor.origin);
  STATE.map.flyTo([coords[0], coords[1]], 4, { duration: 1.2 });

  const content = document.getElementById('detail-content');
  content.innerHTML = `
    <div class="d-title">${actor.title}</div>
    <div class="d-badges">
      <span class="d-tag" style="border-color:${CONFIG.colors[(actor.threat || 'medium').toLowerCase()]}; color:${CONFIG.colors[(actor.threat || 'medium').toLowerCase()]}">${actor.threat.toUpperCase()}</span>
      <span class="d-tag" style="border-color:var(--accent); color:var(--accent)">${actor.category}</span>
      <span class="d-tag">${actor.status}</span>
    </div>
    
    ${actor.tldr ? `<div class="d-section"><div class="d-label">Intelligence Summary</div><div class="d-text">${actor.tldr}</div></div>` : ''}
    
    <div class="d-section">
      <div class="d-label">Profile</div>
      <div class="d-text">
        📍 Origin: ${actor.origin || 'Unknown'}<br>
        💰 Motivation: ${actor.motivation || 'Unknown'}<br>
        📅 Active: ${actor.first_seen || '?'} → ${actor.last_seen || 'Present'}
      </div>
    </div>

    ${actor.aliases?.length ? `<div class="d-section"><div class="d-label">Aliases</div><div class="d-tags">${actor.aliases.map(a => `<span class="d-tag">${a}</span>`).join('')}</div></div>` : ''}
    ${actor.ttps?.length ? `<div class="d-section"><div class="d-label">TTPs</div><div class="d-tags">${actor.ttps.map(t => `<span class="d-tag">${t}</span>`).join('')}</div></div>` : ''}
    ${actor.targets?.length ? `<div class="d-section"><div class="d-label">Targets</div><div class="d-tags">${actor.targets.map(t => `<span class="d-tag">${t}</span>`).join('')}</div></div>` : ''}
    ${actor.tools?.length ? `<div class="d-section"><div class="d-label">Tools / Malware</div><div class="d-tags">${actor.tools.map(t => `<span class="d-tag" style="color:var(--threat-high)">${t}</span>`).join('')}</div></div>` : ''}
    ${actor.iocs?.length ? `<div class="d-section"><div class="d-label">Known IOCs</div><div class="d-tags">${actor.iocs.map(t => `<span class="d-tag" style="color:var(--threat-crit)">${t}</span>`).join('')}</div></div>` : ''}
    
    <a href="${actor.url}" class="d-link" target="_blank">View Full Intelligence Report →</a>
  `;

  document.getElementById('detail-panel').classList.add('open');
}

function closeDetail() {
  STATE.selectedSlug = null;
  document.getElementById('detail-panel').classList.remove('open');
  document.querySelectorAll('.actor-item').forEach(r => r.classList.remove('active'));
  Object.values(STATE.markers).forEach(m => {
    const el = m.marker.getElement();
    if (el) { el.classList.remove('marker-selected', 'marker-dimmed'); }
  });
  STATE.arcs.forEach(arc => arc.setStyle({ opacity: 0.35 }));
  STATE.map.flyTo(CONFIG.map.center, CONFIG.map.zoom, { duration: 1 });
}

function updateStats() {
  const counts = { critical: 0, high: 0, medium: 0, low: 0 };
  window.ACTOR_DATA.forEach(a => {
    const t = (a.threat || 'medium').toLowerCase();
    if (counts[t] !== undefined) counts[t]++;
  });
  document.getElementById('stat-c').textContent = counts.critical;
  document.getElementById('stat-h').textContent = counts.high;
  document.getElementById('stat-m').textContent = counts.medium;
}

function applyFilters() {
  const query = STATE.searchQuery.toLowerCase();
  const filter = STATE.filter;
  
  document.querySelectorAll('.actor-item').forEach(row => {
    const slug = row.dataset.slug;
    const actor = window.ACTOR_DATA.find(a => a.slug === slug);
    const matchSearch = !query || 
      actor.title.toLowerCase().includes(query) || 
      (actor.origin || '').toLowerCase().includes(query) ||
      (actor.category || '').toLowerCase().includes(query) ||
      (actor.targets || []).some(t => t.toLowerCase().includes(query));
    
    const matchFilter = filter === 'all' || 
      (filter === 'active' && actor.status.toLowerCase() === 'active') ||
      actor.category.toLowerCase().includes(filter);

    row.classList.toggle('hidden', !(matchSearch && matchFilter));
    
    const markerObj = STATE.markers[slug];
    if (markerObj) {
      if (matchSearch && matchFilter) {
        if (!STATE.map.hasLayer(markerObj.marker)) STATE.map.addLayer(markerObj.marker);
      } else {
        if (STATE.map.hasLayer(markerObj.marker)) STATE.map.removeLayer(markerObj.marker);
      }
    }
  });
}

function filterActors(type, btn) {
  STATE.filter = type;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  applyFilters();
}

document.addEventListener('DOMContentLoaded', () => {
  setInterval(() => {
    document.getElementById('clock').textContent = new Date().toLocaleTimeString('en-US', { timeZone: 'UTC', hour12: false });
  }, 1000);

  const nav = document.querySelector('nav, header, .site-header');
  if (nav) document.getElementById('dashboard').style.top = nav.offsetHeight + 'px';

  setTimeout(initMap, 150);

  document.getElementById('search-input').addEventListener('input', e => {
    STATE.searchQuery = e.target.value;
    applyFilters();
  });

  document.getElementById('back-btn').addEventListener('click', closeDetail);
});
</script>
