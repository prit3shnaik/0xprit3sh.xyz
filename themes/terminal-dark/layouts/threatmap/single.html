{{ define "main" }}

{{ $actors := where .Site.RegularPages "Section" "eq" "actors" }}

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>~/threat-map · Global Threat Actor Intelligence</title>
    
    <!-- Leaflet CSS + JS -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, 'Segoe UI', 'JetBrains Mono', monospace;
            background: #050508;
            overflow: hidden;
            height: 100vh;
        }

        /* ========== FULLSCREEN MAP ========== */
        #threat-map {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 1;
        }

        /* ========== GLASS HUD TOP BAR ========== */
        .map-hud {
            position: fixed;
            top: 20px;
            left: 20px;
            right: 20px;
            z-index: 100;
            display: flex;
            justify-content: space-between;
            align-items: center;
            pointer-events: none;
        }

        .hud-left {
            background: rgba(5, 5, 8, 0.75);
            backdrop-filter: blur(16px);
            border-radius: 40px;
            padding: 8px 20px;
            border: 1px solid rgba(0, 255, 65, 0.3);
            pointer-events: auto;
        }

        .hud-left h1 {
            font-size: 0.9rem;
            font-weight: 500;
            color: #00ff41;
            letter-spacing: 2px;
        }

        .hud-left .sub {
            font-size: 0.65rem;
            color: #888;
            margin-top: 2px;
        }

        .live-indicator {
            display: inline-block;
            width: 8px;
            height: 8px;
            background: #00ff41;
            border-radius: 50%;
            margin-right: 8px;
            animation: pulse 1.5s infinite;
            box-shadow: 0 0 8px #00ff41;
        }

        .hud-right {
            background: rgba(5, 5, 8, 0.75);
            backdrop-filter: blur(16px);
            border-radius: 40px;
            padding: 8px 20px;
            border: 1px solid rgba(0, 255, 65, 0.3);
            font-size: 0.7rem;
            pointer-events: auto;
            display: flex;
            gap: 16px;
        }

        .hud-stat {
            color: #aaa;
        }

        .hud-stat strong {
            color: #00ff41;
            font-weight: 600;
        }

        /* ========== SLIDE-OUT DRAWER (LEFT SIDE) ========== */
        .threat-drawer {
            position: fixed;
            left: -420px;
            top: 0;
            width: 420px;
            height: 100vh;
            background: rgba(8, 8, 14, 0.96);
            backdrop-filter: blur(24px);
            border-right: 1px solid rgba(0, 255, 65, 0.4);
            z-index: 200;
            transition: left 0.35s cubic-bezier(0.16, 1, 0.3, 1);
            display: flex;
            flex-direction: column;
            box-shadow: 5px 0 40px rgba(0, 0, 0, 0.6);
        }

        .threat-drawer.open {
            left: 0;
        }

        .drawer-tab {
            position: absolute;
            right: -48px;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(0, 255, 65, 0.15);
            border: 1px solid rgba(0, 255, 65, 0.5);
            border-left: none;
            border-radius: 0 12px 12px 0;
            padding: 16px 10px;
            cursor: pointer;
            writing-mode: vertical-rl;
            font-size: 0.7rem;
            letter-spacing: 3px;
            font-weight: 600;
            color: #00ff41;
            backdrop-filter: blur(12px);
            transition: all 0.2s;
            pointer-events: auto;
        }

        .drawer-tab:hover {
            background: rgba(0, 255, 65, 0.3);
            width: auto;
        }

        .drawer-header {
            padding: 28px 24px 20px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
        }

        .drawer-header h2 {
            font-size: 1.2rem;
            font-weight: 500;
            color: #00ff41;
            letter-spacing: 1px;
        }

        .drawer-header h2 i {
            margin-right: 8px;
        }

        .actor-stats {
            display: flex;
            gap: 20px;
            margin-top: 16px;
        }

        .actor-stats .stat {
            font-size: 0.7rem;
            color: #9ca3af;
        }

        .actor-stats .stat strong {
            color: #00ff41;
            font-size: 1.1rem;
            margin-right: 4px;
        }

        /* Search + Filters */
        .drawer-search {
            padding: 16px 20px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .search-input {
            width: 100%;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 30px;
            padding: 10px 16px;
            color: white;
            font-size: 0.8rem;
            outline: none;
            transition: all 0.2s;
        }

        .search-input:focus {
            border-color: #00ff41;
            background: rgba(0, 255, 65, 0.05);
        }

        .filter-row {
            display: flex;
            gap: 8px;
            margin-top: 12px;
            flex-wrap: wrap;
        }

        .filter-pill {
            background: rgba(255, 255, 255, 0.05);
            border: none;
            border-radius: 20px;
            padding: 5px 14px;
            font-size: 0.7rem;
            color: #ccc;
            cursor: pointer;
            transition: all 0.15s;
        }

        .filter-pill:hover {
            background: rgba(0, 255, 65, 0.2);
        }

        .filter-pill.active {
            background: #00ff41;
            color: #000;
            font-weight: 500;
        }

        /* Actor List Scroll */
        .actor-list-container {
            flex: 1;
            overflow-y: auto;
            padding: 16px 16px 24px;
        }

        .actor-item {
            background: rgba(255, 255, 255, 0.02);
            border-radius: 12px;
            padding: 14px;
            margin-bottom: 10px;
            cursor: pointer;
            transition: all 0.2s;
            border: 1px solid transparent;
        }

        .actor-item:hover {
            background: rgba(0, 255, 65, 0.08);
            border-color: rgba(0, 255, 65, 0.3);
            transform: translateX(4px);
        }

        .actor-item-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 6px;
        }

        .actor-name {
            font-size: 0.85rem;
            font-weight: 600;
            color: white;
        }

        .threat-level {
            font-size: 0.6rem;
            padding: 2px 8px;
            border-radius: 20px;
            font-weight: 600;
        }

        .threat-critical { background: #ff4444; color: white; box-shadow: 0 0 6px #ff4444; }
        .threat-high { background: #ff9944; color: #1a1a1a; }
        .threat-medium { background: #ffd966; color: #1a1a1a; }
        .threat-low { background: #00ff41; color: #000; }

        .actor-meta {
            font-size: 0.65rem;
            color: #9ca3af;
            display: flex;
            gap: 12px;
            margin-top: 6px;
        }

        .actor-meta i {
            width: 14px;
            font-size: 0.6rem;
        }

        /* ========== FLOATING ACTOR CARDS (on map) ========== */
        .floating-card {
            background: rgba(12, 12, 20, 0.92);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(0, 255, 65, 0.4);
            border-radius: 10px;
            padding: 8px 14px;
            min-width: 160px;
            max-width: 220px;
            font-size: 0.7rem;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
            transition: all 0.2s;
            cursor: pointer;
        }

        .floating-card:hover {
            transform: scale(1.02);
            border-color: #00ff41;
            background: rgba(0, 255, 65, 0.15);
        }

        .card-title {
            font-weight: 700;
            color: #00ff41;
            font-size: 0.75rem;
            margin-bottom: 4px;
        }

        .card-detail {
            color: #bbb;
            font-size: 0.6rem;
            display: flex;
            justify-content: space-between;
            margin-top: 4px;
        }

        /* ========== ANIMATIONS ========== */
        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.4; transform: scale(1.2); }
        }

        @keyframes glowPulse {
            0% { box-shadow: 0 0 0 0 rgba(0, 255, 65, 0.4); }
            70% { box-shadow: 0 0 0 8px rgba(0, 255, 65, 0); }
            100% { box-shadow: 0 0 0 0 rgba(0, 255, 65, 0); }
        }

        /* Scrollbar styling */
        .actor-list-container::-webkit-scrollbar {
            width: 4px;
        }
        .actor-list-container::-webkit-scrollbar-track {
            background: #1a1a1a;
        }
        .actor-list-container::-webkit-scrollbar-thumb {
            background: #00ff41;
            border-radius: 4px;
        }
    </style>
</head>
<body>

<div id="threat-map"></div>

<!-- HUD -->
<div class="map-hud">
    <div class="hud-left">
        <h1><span class="live-indicator"></span> ~/THREAT MAP</h1>
        <div class="sub">GLOBAL ACTOR INTELLIGENCE · REAL-TIME</div>
    </div>
    <div class="hud-right">
        <div class="hud-stat"><i class="fas fa-skull"></i> <strong id="totalActors">0</strong> tracked</div>
        <div class="hud-stat"><i class="fas fa-globe"></i> <strong id="activeCountries">0</strong> origins</div>
    </div>
</div>

<!-- SLIDE-OUT DRAWER (LEFT) -->
<div id="threatDrawer" class="threat-drawer">
    <div class="drawer-tab" id="drawerToggle">
        <i class="fas fa-chevron-right"></i> ACTORS
    </div>
    <div class="drawer-header">
        <h2><i class="fas fa-bug"></i> Tracked Actors</h2>
        <div class="actor-stats">
            <div class="stat"><strong id="drawerActorCount">0</strong> total</div>
            <div class="stat"><i class="fas fa-chart-line"></i> active threats</div>
        </div>
    </div>
    <div class="drawer-search">
        <input type="text" id="actorSearch" class="search-input" placeholder="🔍 Search by name, origin, or category...">
        <div class="filter-row">
            <button class="filter-pill active" data-threat="all">All</button>
            <button class="filter-pill" data-threat="critical">Critical</button>
            <button class="filter-pill" data-threat="high">High</button>
            <button class="filter-pill" data-threat="medium">Medium</button>
            <button class="filter-pill" data-threat="low">Low</button>
        </div>
    </div>
    <div class="actor-list-container" id="actorListContainer">
        <!-- dynamic list injected -->
    </div>
</div>

<script>
// ==================== ACTOR DATA FROM HUGO ====================
window.ACTOR_DATA = [
  {{ range $actors }}
  {
    title: {{ .Title | jsonify }},
    slug: {{ .File.BaseFileName | jsonify }},
    url: {{ .Permalink | jsonify }},
    origin: {{ .Params.origin | default "Unknown" | jsonify }},
    category: {{ .Params.category | default "Unknown" | jsonify }},
    threat: {{ .Params.threat_level | default "medium" | jsonify }},
    status: {{ .Params.status | default "active" | jsonify }},
    tldr: {{ .Params.tldr | default "" | jsonify }},
  },
  {{ end }}
];

// Country coordinates database
const COUNTRY_COORDS = {
    "china": [35.86, 104.19], "north korea": [40.33, 127.51], "russia": [61.52, 105.31],
    "iran": [32.42, 53.68], "india": [20.59, 78.96], "pakistan": [30.37, 69.34],
    "vietnam": [14.05, 108.27], "ukraine": [48.37, 31.16], "germany": [51.16, 10.45],
    "uk": [55.37, -3.43], "united kingdom": [55.37, -3.43], "france": [46.22, 2.21],
    "united states": [37.09, -95.71], "usa": [37.09, -95.71], "brazil": [-14.23, -51.92],
    "turkey": [38.96, 35.24], "israel": [31.04, 34.85], "saudi arabia": [23.88, 45.07],
    "australia": [-25.27, 133.77], "unknown": [20.0, 0.0], "global": [20.0, 0.0]
};

function getCoords(origin) {
    if (!origin) return COUNTRY_COORDS["unknown"];
    const key = origin.toLowerCase();
    for (let [country, coords] of Object.entries(COUNTRY_COORDS)) {
        if (key.includes(country)) return coords;
    }
    return COUNTRY_COORDS["unknown"];
}

const THREAT_STYLES = {
    critical: { color: "#ff4444", size: 12, glow: "#ff4444" },
    high: { color: "#ff9944", size: 10, glow: "#ff9944" },
    medium: { color: "#ffd966", size: 9, glow: "#ffd966" },
    low: { color: "#00ff41", size: 8, glow: "#00ff41" }
};

// Initialize map
const map = L.map('threat-map', {
    center: [25, 10],
    zoom: 2,
    minZoom: 1.8,
    zoomControl: true,
    attributionControl: false
});

// Dark satellite style
L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
    subdomains: 'abcd',
    maxZoom: 6,
    attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OSM</a>'
}).addTo(map);

L.control.zoom({ position: 'bottomright' }).addTo(map);

// Store markers and floating cards
let markers = [];
let floatingCards = [];

// Create custom marker + floating card
function addActorToMap(actor) {
    const coords = getCoords(actor.origin);
    const threat = actor.threat.toLowerCase();
    const style = THREAT_STYLES[threat] || THREAT_STYLES.medium;
    
    // Pulsing circle marker
    const markerIcon = L.divIcon({
        className: 'custom-marker',
        html: `<div style="width:${style.size}px;height:${style.size}px;background:${style.color};border-radius:50%;box-shadow:0 0 0 2px rgba(0,0,0,0.5),0 0 12px ${style.glow};animation:glowPulse 2s infinite;"></div>`,
        iconSize: [style.size, style.size],
        iconAnchor: [style.size/2, style.size/2]
    });
    
    const marker = L.marker(coords, { icon: markerIcon }).addTo(map);
    
    // Floating card that follows marker (visible on hover)
    const cardDiv = document.createElement('div');
    cardDiv.className = 'floating-card';
    cardDiv.innerHTML = `
        <div class="card-title">${actor.title}</div>
        <div class="card-detail">
            <span><i class="fas fa-flag"></i> ${actor.origin}</span>
            <span style="color:${style.color}">● ${actor.threat.toUpperCase()}</span>
        </div>
        <div class="card-detail"><span><i class="fas fa-tag"></i> ${actor.category}</span></div>
    `;
    cardDiv.style.position = 'absolute';
    cardDiv.style.display = 'none';
    cardDiv.style.zIndex = '1000';
    cardDiv.style.pointerEvents = 'auto';
    cardDiv.onclick = () => window.location.href = actor.url;
    document.body.appendChild(cardDiv);
    
    marker.on('mouseover', (e) => {
        const point = map.latLngToContainerPoint(coords);
        cardDiv.style.left = (point.x + 15) + 'px';
        cardDiv.style.top = (point.y - 40) + 'px';
        cardDiv.style.display = 'block';
    });
    
    marker.on('mouseout', () => {
        cardDiv.style.display = 'none';
    });
    
    marker.on('click', () => window.location.href = actor.url);
    
    markers.push({ marker, actor, card: cardDiv });
}

// Draw all actors
window.ACTOR_DATA.forEach(actor => addActorToMap(actor));

// Update HUD stats
document.getElementById('totalActors').innerText = window.ACTOR_DATA.length;
const uniqueOrigins = new Set(window.ACTOR_DATA.map(a => a.origin?.toLowerCase())).size;
document.getElementById('activeCountries').innerText = uniqueOrigins;

// ==================== DRAWER LOGIC ====================
const drawer = document.getElementById('threatDrawer');
const toggleBtn = document.getElementById('drawerToggle');

toggleBtn.addEventListener('click', () => {
    drawer.classList.toggle('open');
    toggleBtn.querySelector('i').classList.toggle('fa-chevron-right');
    toggleBtn.querySelector('i').classList.toggle('fa-chevron-left');
});

// Render actor list in drawer
function renderActorList(filterThreat = 'all', searchTerm = '') {
    const container = document.getElementById('actorListContainer');
    let filtered = [...window.ACTOR_DATA];
    
    if (filterThreat !== 'all') {
        filtered = filtered.filter(a => a.threat.toLowerCase() === filterThreat);
    }
    if (searchTerm) {
        const term = searchTerm.toLowerCase();
        filtered = filtered.filter(a => 
            a.title.toLowerCase().includes(term) || 
            a.origin.toLowerCase().includes(term) ||
            a.category.toLowerCase().includes(term)
        );
    }
    
    document.getElementById('drawerActorCount').innerText = filtered.length;
    
    if (filtered.length === 0) {
        container.innerHTML = '<div style="text-align:center;padding:40px;color:#666;">No actors match</div>';
        return;
    }
    
    container.innerHTML = filtered.map(actor => {
        const threatClass = `threat-${actor.threat.toLowerCase()}`;
        return `
            <div class="actor-item" data-slug="${actor.slug}" data-url="${actor.url}">
                <div class="actor-item-header">
                    <span class="actor-name">${escapeHtml(actor.title)}</span>
                    <span class="threat-level ${threatClass}">${actor.threat.toUpperCase()}</span>
                </div>
                <div class="actor-meta">
                    <span><i class="fas fa-map-marker-alt"></i> ${escapeHtml(actor.origin)}</span>
                    <span><i class="fas fa-folder"></i> ${escapeHtml(actor.category)}</span>
                </div>
                <div class="actor-meta">${actor.tldr ? actor.tldr.substring(0, 80) + '…' : 'No description'}</div>
            </div>
        `;
    }).join('');
    
    // Add click handlers to actor items
    document.querySelectorAll('.actor-item').forEach(el => {
        el.addEventListener('click', () => {
            window.location.href = el.dataset.url;
        });
    });
}

function escapeHtml(str) {
    if (!str) return '';
    return str.replace(/[&<>]/g, function(m) {
        if (m === '&') return '&amp;';
        if (m === '<') return '&lt;';
        if (m === '>') return '&gt;';
        return m;
    });
}

// Search & filter handlers
let currentThreat = 'all';
let currentSearch = '';

const searchInput = document.getElementById('actorSearch');
searchInput.addEventListener('input', (e) => {
    currentSearch = e.target.value;
    renderActorList(currentThreat, currentSearch);
});

document.querySelectorAll('.filter-pill').forEach(btn => {
    btn.addEventListener('click', () => {
        document.querySelectorAll('.filter-pill').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        currentThreat = btn.dataset.threat;
        renderActorList(currentThreat, currentSearch);
    });
});

// Highlight marker when hovering actor in list (bonus)
function highlightMarkerBySlug(slug) {
    const markerData = markers.find(m => m.actor.slug === slug);
    if (markerData) {
        map.panTo(markerData.marker.getLatLng());
        markerData.marker.openPopup();
    }
}

// Initial render
renderActorList('all', '');

// Small hack to make drawer work nicely on mobile
if (window.innerWidth < 768) {
    drawer.style.width = '320px';
    drawer.style.left = '-320px';
}

</script>

<style>
    /* Leaflet overrides for dark theme */
    .leaflet-control-zoom a {
        background: rgba(10, 10, 15, 0.8) !important;
        color: #00ff41 !important;
        border: 1px solid rgba(0, 255, 65, 0.3) !important;
    }
    .leaflet-control-zoom a:hover {
        background: #00ff41 !important;
        color: #000 !important;
    }
    .leaflet-container {
        background: #030308 !important;
    }
</style>

{{ end }}
