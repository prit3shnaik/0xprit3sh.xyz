<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ if .Title }}{{ .Title }} | {{ end }}{{ .Site.Title }}</title>
  <meta name="description" content="{{ with .Description }}{{ . }}{{ else }}{{ .Site.Params.description }}{{ end }}">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:ital,wght@0,300;0,400;0,700;1,400&family=Share+Tech+Mono&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ "css/main.css" | relURL }}">
  {{ if .Params.leaflet }}
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  {{ end }}
  {{ partial "head-extra.html" . }}
</head>
<body>
  <div class="scanline"></div>
  <header class="site-header">
    <div class="container">
      <a href="{{ "/" | relURL }}" class="site-logo">
        <span class="prompt">root@0xprit3sh</span><span class="cursor-blink">:~$</span>
      </a>
      <nav class="main-nav">
        {{ range .Site.Menus.main }}
        <a href="{{ .URL }}" class="{{ if $.IsMenuCurrent "main" . }}active{{ end }}">{{ .Name }}</a>
        {{ end }}
      </nav>
    </div>
  </header>

  <main class="site-main">
    <div class="container">
      {{ block "main" . }}{{ end }}
    </div>
  </main>

  <footer class="site-footer">
    <div class="container">
      <span>// {{ .Site.Params.author }} — {{ now.Format "2006" }}</span>
      <span>
        <a href="https://github.com/{{ .Site.Params.github }}" target="_blank">github</a> /
        <a href="https://linkedin.com/in/{{ .Site.Params.linkedin }}" target="_blank">linkedin</a>
      </span>
    </div>
  </footer>

  <script src="{{ "js/main.js" | relURL }}"></script>
</body>
</html>
