{{ $id := .Get "id" | default "map" }}
{{ $lat := .Get "lat" | default "20" }}
{{ $lng := .Get "lng" | default "0" }}
{{ $zoom := .Get "zoom" | default "2" }}
{{ $height := .Get "height" | default "450px" }}
 
<div class="map-container">
  <div id="map-{{ $id }}" style="height: {{ $height }};"></div>
  {{ with .Inner }}
  <script type="application/json" id="markers-{{ $id }}">{{ . }}</script>
  {{ end }}
</div>
 
<script>
(function() {
  const el = document.getElementById('map-{{ $id }}');
  if (!el || typeof L === 'undefined') return;
  const map = L.map('map-{{ $id }}').setView([{{ $lat }}, {{ $lng }}], {{ $zoom }});
  L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
    attribution: '&copy; OpenStreetMap &copy; CARTO', subdomains: 'abcd', maxZoom: 19
  }).addTo(map);
  const raw = document.getElementById('markers-{{ $id }}');
  if (raw) {
    try {
      JSON.parse(raw.textContent).forEach(m => {
        const icon = L.divIcon({
          className: 'custom-marker',
          html: `<div class="marker-dot" style="background:${m.color||'#00ff41'};box-shadow:0 0 6px ${m.color||'#00ff41'}"></div>`,
          iconSize: [10,10], iconAnchor: [5,5]
        });
        const mk = L.marker([m.lat, m.lng], { icon }).addTo(map);
        if (m.label) mk.bindPopup(`<div class="map-popup"><strong>${m.label}</strong>${m.type?`<span class="popup-type"> [${m.type}]</span>`:''}${m.desc?`<p>${m.desc}</p>`:''}${m.ip?`<code>${m.ip}</code>`:''}</div>`);
      });
    } catch(e) { console.warn('map parse error', e); }
  }
})();
</script>
