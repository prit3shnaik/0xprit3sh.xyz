{{ $id := .Get "id" | default "map" }}
{{ $lat := .Get "lat" | default "15.2993" }}
{{ $lng := .Get "lng" | default "74.1240" }}
{{ $zoom := .Get "zoom" | default "10" }}
{{ $height := .Get "height" | default "450px" }}

<div class="map-container">
  <div id="map-{{ $id }}" class="leaflet-map" style="height: {{ $height }};"></div>
  {{ with .Inner }}
  <script type="application/json" id="markers-{{ $id }}">{{ . }}</script>
  {{ end }}
</div>

<script>
(function() {
  const mapEl = document.getElementById('map-{{ $id }}');
  if (!mapEl || typeof L === 'undefined') return;

  const map = L.map('map-{{ $id }}', {
    center: [{{ $lat }}, {{ $lng }}],
    zoom: {{ $zoom }},
    zoomControl: true
  });

  L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
    attribution: '&copy; OpenStreetMap &copy; CARTO',
    subdomains: 'abcd',
    maxZoom: 19
  }).addTo(map);

  const markerData = document.getElementById('markers-{{ $id }}');
  if (markerData) {
    try {
      const markers = JSON.parse(markerData.textContent);
      markers.forEach(function(m) {
        const icon = L.divIcon({
          className: 'custom-marker',
          html: `<div class="marker-dot" style="background:${m.color||'#00ff41'}"></div>`,
          iconSize: [12, 12],
          iconAnchor: [6, 6]
        });
        const marker = L.marker([m.lat, m.lng], { icon: icon }).addTo(map);
        if (m.label) {
          marker.bindPopup(`
            <div class="map-popup">
              <strong>${m.label}</strong>
              ${m.type ? `<span class="popup-type">[${m.type}]</span>` : ''}
              ${m.desc ? `<p>${m.desc}</p>` : ''}
              ${m.ip ? `<code>IP: ${m.ip}</code>` : ''}
            </div>
          `);
        }
      });
    } catch(e) { console.warn('Map marker parse error:', e); }
  }
})();
</script>
